<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>כניסת מנהל - LeadMaster</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Heebo',sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
width:420px;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

h1{
text-align:center;
margin-bottom:25px;
color:#0f172a;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
font-weight:700;
}

button:hover{
background:#1d4ed8;
}

.error{
background:#fee2e2;
color:#b91c1c;
padding:12px;
margin-bottom:15px;
border-radius:10px;
text-align:center;
}

.back{
text-align:center;
margin-top:20px;
}

.back a{
text-decoration:none;
color:#2563eb;
font-weight:700;
}

</style>

</head>

<body>

<div class="login-box">

<h1>כניסת מנהל</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="error">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<input
type="text"
name="username"
placeholder="שם משתמש"
required
>

<input
type="password"
name="password"
placeholder="סיסמה"
required
>

<button type="submit">
התחבר
</button>

</form>

<div class="back">
<a href="/">חזרה לאתר</a>
</div>

</div>

</body>
</html>
